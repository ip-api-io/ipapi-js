name: release

# Builds the npm package (.tgz). On a v* tag it is also attached to a GitHub
# Release. Publishing to npm is a separate, later step — no tokens are used here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: javascript-package
          path: "*.tgz"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" *.tgz --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" *.tgz --clobber
